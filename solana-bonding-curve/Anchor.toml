[toolchain]
anchor_version = "0.29.0"

[features]
resolution = true
skip-lint = false

[programs.localnet]
bonding_curve = "CqzUoSdSQPpcTJXhiTgAdupoaJ9yRTjbVXVfC41Aqckm"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[workspace]
members = ["programs/bonding-curve"]

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[[test.genesis]]
address = "8pwEParUTtoh5GDpxs5RmspaSHpPuHmKQaEQSCxx2KGp"
program = "./target/deploy/bonding_curve.so"
