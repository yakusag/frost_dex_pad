<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#04061400" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" href="/favicon.webp" />

    <title>FrostDex</title>

    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #04060e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* logo */
      #splash img {
        width: 120px;
        height: 120px;
        object-fit: contain;
        filter: drop-shadow(0 0 24px rgba(60, 230, 255, 0.5));
        animation: splash-pulse 2s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { filter: drop-shadow(0 0 18px rgba(60,230,255,0.4)); transform: scale(1);   }
        50%       { filter: drop-shadow(0 0 36px rgba(60,230,255,0.8)); transform: scale(1.06); }
      }

      /* brand name */
      #splash-name {
        font-family: 'Manrope', 'Segoe UI', sans-serif;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        background: linear-gradient(135deg, #00d28c 0%, #3ce6ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* progress bar */
      #splash-bar-track {
        width: 160px;
        height: 2px;
        background: rgba(60, 230, 255, 0.1);
        border-radius: 9999px;
        overflow: hidden;
      }
      #splash-bar {
        height: 100%;
        width: 0%;
        border-radius: 9999px;
        background: linear-gradient(90deg, #00d28c, #3ce6ff);
        animation: splash-load 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        box-shadow: 0 0 8px rgba(60, 230, 255, 0.7);
      }
      @keyframes splash-load {
        0%   { width: 0%;   }
        60%  { width: 75%;  }
        85%  { width: 90%;  }
        100% { width: 100%; }
      }

      /* floating ice particles */
      #splash-particles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .sp {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(60,230,255,0.6), transparent 70%);
        animation: sp-float linear infinite;
      }
      @keyframes sp-float {
        0%   { transform: translateY(110vh) scale(0.6); opacity: 0;   }
        10%  { opacity: 1; }
        90%  { opacity: 0.6; }
        100% { transform: translateY(-20vh) scale(1.1);  opacity: 0;   }
      }
    </style>
  </head>
  <body>
    <!-- splash screen -->
    <div id="splash">
      <div id="splash-particles"></div>
      <img src="/logo.webp" alt="FrostDex" onerror="this.style.display='none'" />
      <div id="splash-name">FrostDex</div>
      <div id="splash-bar-track">
        <div id="splash-bar"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>

    <script>
      /* generate floating ice particles */
      (function () {
        var container = document.getElementById('splash-particles');
        for (var i = 0; i < 18; i++) {
          var p = document.createElement('div');
          p.className = 'sp';
          var size = Math.random() * 6 + 3;
          p.style.cssText = [
            'width:'  + size + 'px',
            'height:' + size + 'px',
            'left:'   + Math.random() * 100 + '%',
            'animation-duration:' + (Math.random() * 6 + 5) + 's',
            'animation-delay:' + (Math.random() * 5) + 's'
          ].join(';');
          container.appendChild(p);
        }
      })();

      /* hide splash once React has mounted */
      window.__hideSplash = function () {
        var s = document.getElementById('splash');
        if (s) {
          s.classList.add('hidden');
          setTimeout(function () { s.remove(); }, 600);
        }
      };
    </script>
  </body>
</html>
